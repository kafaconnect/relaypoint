name: go-ci

on:
  pull_request:
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - "scripts/check-logging.sh"
      - ".github/workflows/go-ci.yml"

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          check-latest: true
      - name: gofmt
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "::error::gofmt needs to run on:"; echo "$unformatted"; exit 1
          fi
      - name: build
        run: go build ./...
      - name: vet
        run: go vet ./...
      - name: test (race)
        run: go test ./... -race
      - name: logging gate (no ad-hoc logging)
        run: bash scripts/check-logging.sh
