syntax = "proto3";

// RelayPoint interaction signaling wire contract — protobuf for ALL RP<->client traffic
// (the .log facts, the .cmd commands + results, and the ephemeral .signal events).
// Supersedes the JSON envelope (ADR-0002). The router never parses `data` (opaque per
// event_type/medium); the media-negotiation descriptor and channel payloads ride in `data`.
//
// PAYLOAD REGISTRY (event_type/medium -> the proto message marshaled into `data`). Consumers
// decode `data` by this registry; the envelope never changes when a payload type is added:
//   medium=chat, event_type=message.created/updated   -> ChatMessage
//   (typing / webrtc.ice / webrtc.offer / call.*       -> added with their slices: TypingSignal,
//    IceCandidate, SessionDescription — NOT in the chat slice)
//   intentionally-opaque blobs (e.g. SDP)              -> raw bytes, no decode
package relaypoint.interaction.v1;

import "google/protobuf/timestamp.proto";

// Generated Go is PUBLIC (Desk is a Go consumer and must import it) — not under internal/.
option go_package = "github.com/kafaconnect/relaypoint/gen/go/relaypoint/interaction/v1;interactionpb";

// schema constant carried on every envelope: "relaypoint.interaction.v1".

// Event is the authoritative `.log` fact (one envelope for chat AND call; `medium` is a
// payload field, never a subject). Router-written only.
message Event {
  string schema = 1;
  string event_type = 2;       // message.created, interaction.started/ended, webrtc.offer, ...
  string event_id = 3;
  int64 sequence = 4;          // dense per-interaction, router-assigned (NOT the stream seq)
  google.protobuf.Timestamp occurred_at = 5; // display-only — never order/dedup/secure by this
  string tenant_id = 6;
  string actor_id = 7;
  string medium = 8;           // 'chat' | 'call'
  string media_profile = 9;    // 'webrtc-p2p' (call facts only); "" when absent
  string command_id = 10;
  string payload_hash = 11;    // cross-restart conflict detection (router-internal)
  string caused_by = 12;       // = the producing command_id
  string ref_id = 13;
  bytes data = 14;             // opaque per event_type/medium (payload registry above); router never parses

  // Audit trail for a router-written participation fact (participant.joined/left,
  // interaction.assigned) produced from a privileged participation command. Empty on ordinary
  // facts. actor_id stays the AFFECTED agent; commanded_by is the privileged ACTOR.
  // See openspec change agent-feed-fanout (Decision 2a).
  string commanded_by = 15;    // the privileged actor (e.g. desk-svc identity) that issued the command
  string reason = 16;          // audit reason
  string request_id = 17;      // audit correlation id of the originating command
}

// Command is a client intent published on `interaction.<id>.cmd` (request/reply, write-only).
message Command {
  string command_id = 1;       // reused across retries so the router dedups
  string tenant_id = 2;
  string actor_id = 3;
  string type = 4;
  string medium = 5;
  string ref_id = 6;
  bytes data = 7;              // opaque per type/medium (payload registry above)
}

// CommandResult is replied ONLY to the issuer's inbox (ephemeral, never persisted to JetStream).
message CommandResult {
  string command_id = 1;
  Status status = 2;
  string caused_by = 3;
  string reason = 4;

  enum Status {
    STATUS_UNSPECIFIED = 0;
    STATUS_ACCEPTED = 1;
    STATUS_REJECTED = 2;
  }
}

// SignalEvent is the ephemeral per-publisher `.signal.<userId>` payload (ICE/typing) — core
// NATS, never JetStream. `actor_id` is carried in the payload (in addition to the subject) so a
// `.signal.*` subscriber identifies the publisher without parsing the subject.
message SignalEvent {
  string schema = 1;           // "relaypoint.interaction.v1"
  string type = 2;             // webrtc.ice, typing, ...
  string actor_id = 3;
  bytes data = 4;              // opaque (IceCandidate / TypingSignal / ...)
}

// ChatMessage is the FIRST registry payload (medium='chat', event_type='message.created'):
// protobuf-encoded into Event.data / Command.data. More typed payloads are added incrementally.
message ChatMessage {
  string text = 1;
  repeated string attachment_refs = 2; // object refs (media off NATS)
}

// FeedControl is the ONE agent-feed message that is NOT a copied .log Event: a small
// feed-control marker the Fan-out service writes into tenant.<tid>.agent.<aid>.feed.<iid>.
// A feed consumer distinguishes it from a projected Event by the `control` type marker.
// `feed.revoked` is the only control type this change defines (agent-feed-fanout, Decision 8):
// it is the terminal tombstone for a revoked interaction, carrying the .log `sequence` at which
// the membership interval closed, so a reconnecting client drops the interaction deterministically.
message FeedControl {
  string schema = 1;          // "relaypoint.interaction.v1"
  string control = 2;         // "feed.revoked"
  string interaction_id = 3;
  int64 at_sequence = 4;      // the .log sequence at which membership closed
}
