# RelayPoint Phase-1 single-node signaling plane: NATS (JetStream + nats.ws + mqtt)
# + coturn (WebRTC NAT traversal) + the router service. Media never touches NATS.
# Credentials come from .env (see .env.example); the `:-` defaults keep a bare
# `docker compose up` working out of the box for dev.
# @spec:deploy.bringup.one-command  @spec:deploy.creds.env-externalised
services:
  nats:
    image: nats:2.10-alpine            # alpine has a shell + wget for the healthcheck
    command: ["-c", "/etc/nats/nats-server.conf"]
    environment:                       # @spec:deploy.creds.env-externalised
      ROUTER_PASSWORD: ${ROUTER_PASSWORD:-router-dev}
      CLIENT_PASSWORD: ${CLIENT_PASSWORD:-client-dev}
      PROJECTOR_PASSWORD: ${PROJECTOR_PASSWORD:-projector-dev}
      AUTH_PASSWORD: ${AUTH_PASSWORD:-auth-dev}
      # The auth account PUBLIC nkey that signs minted users (the SEED stays with the responder).
      AUTH_CALLOUT_ISSUER: ${AUTH_CALLOUT_ISSUER:?set AUTH_CALLOUT_ISSUER — mint an account nkey, see deploy/.env.example}
    volumes:
      - ./nats/nats-server.conf:/etc/nats/nats-server.conf:ro
      - nats-data:/data/jetstream
    ports:
      - "4222:4222"   # client
      - "8222:8222"   # monitoring (/healthz, /jsz, /connz)
      - "8088:8088"   # websocket (nats.ws)
      - "1883:1883"   # mqtt (mobile-ready, unused)
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:8222/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 3s
    restart: unless-stopped

  router:
    build: { context: .., dockerfile: deploy/router.Dockerfile }
    environment:
      NATS_URL: "nats://nats:4222"
      NATS_USER: "router"
      NATS_PASSWORD: ${ROUTER_PASSWORD:-router-dev}
    depends_on:                        # @spec:deploy.health.router-waits-for-nats
      nats:
        condition: service_healthy     # don't race NATS startup
    healthcheck:                       # distroless image self-probes :8222/healthz (no shell/wget)
      test: ["CMD", "/router", "-healthcheck"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 5s
    restart: unless-stopped

  authcallout:
    build: { context: .., dockerfile: deploy/authcallout.Dockerfile }
    environment:
      NATS_URL: "nats://nats:4222"
      NATS_AUTH_USER: "authsvc"
      NATS_AUTH_PASSWORD: ${AUTH_PASSWORD:-auth-dev}
      AUTH_CALLOUT_ACCOUNT: "RP"
      # The issuer SEED + token-verify secret live ONLY here — never in the NATS config.
      AUTH_CALLOUT_ISSUER_SEED: ${AUTH_CALLOUT_ISSUER_SEED:?set AUTH_CALLOUT_ISSUER_SEED — the account seed matching AUTH_CALLOUT_ISSUER}
      AUTH_TOKEN_SECRET: ${AUTH_TOKEN_SECRET:?set AUTH_TOKEN_SECRET}
    depends_on:
      nats:
        condition: service_healthy
    healthcheck:                       # distroless image self-probes :8222/healthz (no shell/wget)
      test: ["CMD", "/authcallout", "-healthcheck"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 5s
    restart: unless-stopped

  coturn:
    image: coturn/coturn:4.6
    network_mode: host          # coturn needs the host's UDP range for relay
    command:
      - -n
      - --realm=relaypoint.local
      - --listening-port=3478
      - --min-port=49160
      - --max-port=49200
      - --lt-cred-mech
      - --user=${COTURN_USER:-relaypoint}:${COTURN_PASSWORD:-relaypoint-dev}
      - --no-tls
      - --no-dtls
    restart: unless-stopped

volumes:
  nats-data:
