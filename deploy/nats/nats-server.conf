# RelayPoint — single-node NATS (Phase 1). JetStream + websocket (nats.ws) + mqtt
# (mobile-ready, unused) + $SYS. Auth is user/pass for Phase 1 (NKEY/JWT later);
# per-tenant ACLs are enforced by the router + a future auth-callout.
port: 4222
http_port: 8222            # monitoring (/varz, /jsz)
server_name: relaypoint-1

jetstream {
  store_dir: "/data/jetstream"
  max_memory_store: 256MB
  max_file_store: 2GB
}

websocket {                # browser clients via nats.ws
  port: 8088
  no_tls: true             # TLS terminated upstream in dev
}

mqtt {                     # configured now, unused until the mobile phase
  port: 1883
}

accounts {
  SYS: {}
  RP: {
    jetstream: enabled
    users: [
      # the router/interaction service — the ONLY writer of `.log`.
      { user: "router", password: "router-dev", permissions: {
          publish:   { allow: [">"] }
          subscribe: { allow: [">"] }
      } }
      # browser/app clients — READ-only on `.log`, WRITE-only on `.cmd`/`.signal`.
      { user: "client", password: "client-dev", permissions: {
          publish: {
            # clients publish ONLY commands/signals + JS-consumer reads — never to
            # `.log` (forge a fact) nor `_INBOX.>` (spoof a reply; the router is the
            # sole replier).
            allow: [
              "tenant.*.interaction.*.cmd",
              "tenant.*.interaction.*.signal.*",
              "$JS.API.CONSUMER.>"
            ]
            deny:  [ "tenant.*.interaction.*.log" ]
          }
          subscribe: {
            # `_INBOX.>` is needed for request/reply. Phase-1 note: a shared `client`
            # user could subscribe another issuer's inbox — true per-connection inbox
            # isolation needs auth-callout-minted, user-scoped inbox prefixes (deferred
            # with NKEY/JWT, see project.md).
            allow: [
              "tenant.*.interaction.*.log",
              "tenant.*.interaction.*.signal.*",
              "tenant.*.presence.*",
              "tenant.*.routing.offer.user.*",
              "tenant.*.routing.offer.user.*.control",
              "_INBOX.>"
            ]
          }
      } }
    ]
  }
}
system_account: SYS
