# RelayPoint — single-node NATS (Phase 1). JetStream + websocket (nats.ws) + mqtt
# (mobile-ready, unused) + $SYS. Auth is user/pass for the trusted server identities; browser/app
# connections are authorized by the AUTH-CALLOUT responder (openspec change agent-feed-fanout,
# Decisions 1/2b/4/9): it verifies each connection's presented token and MINTS a per-connection,
# identity-pinned set of ACLs — `publish …interaction.*.cmd.<self>` (FIXED <self>; `cmd.<other>`
# denied), `subscribe agent.<self>.feed.>`, a minted `_INBOX_<conn>.>` (broad `_INBOX.>` denied),
# and own offer/notify/presence. This replaces the dev shared `client` user whose `cmd.*` wildcard
# left the `<self>` suffix advisory. The router stays a static trusted user (sole `.log` writer).
#
# Secrets are env-expanded — NONE live in this file:
#   $ROUTER_PASSWORD / $AUTH_PASSWORD  — trusted-user passwords
#   $AUTH_CALLOUT_ISSUER               — the auth account PUBLIC nkey (`A…`) that signs minted users
# The matching issuer SEED + the token-verify secret live ONLY with the responder process
# ($AUTH_CALLOUT_ISSUER_SEED / $AUTH_TOKEN_SECRET) — never in this config, never committed.
port: 4222
http_port: 8222            # monitoring (/varz, /jsz)
server_name: relaypoint-1

jetstream {
  store_dir: "/data/jetstream"
  max_memory_store: 256MB
  max_file_store: 2GB
}

websocket {                # browser clients via nats.ws
  port: 8088
  no_tls: true             # TLS terminated upstream in dev
}

mqtt {                     # configured now, unused until the mobile phase
  port: 1883
}

accounts {
  SYS: {}
  RP: {
    jetstream: enabled
    users: [
      # the router/interaction service — the ONLY writer of `.log`.
      { user: "router", password: $ROUTER_PASSWORD, permissions: {
          publish:   { allow: [">"] }
          subscribe: { allow: [">"] }
      } }
      # the projector/fan-out worker — its OWN identity (ADR-0004 §3, not shared with router). Tails
      # `.log` and writes the per-agent feed.
      { user: "projector", password: $PROJECTOR_PASSWORD, permissions: {
          publish:   { allow: [">"] }
          subscribe: { allow: [">"] }
      } }
      # the auth-callout responder — answers $SYS.REQ.USER.AUTH and mints per-connection users.
      # It is an `auth_users` member (below), so it is EXEMPT from the callout and never locked out.
      # It replies to the server on the `$SYS._INBOX.>` the request carries, so that prefix is in
      # both allow sets (a plain `_INBOX.>` does not cover the system reply subject).
      { user: "authsvc", password: $AUTH_PASSWORD, permissions: {
          publish:   { allow: [ "$SYS.REQ.USER.AUTH", "$SYS._INBOX.>", "_INBOX.>" ] }
          subscribe: { allow: [ "$SYS.REQ.USER.AUTH", "$SYS._INBOX.>", "_INBOX.>" ] }
      } }
      # The DEV-ONLY shared `client` user was REMOVED (M1.5 F1 / ADR-0004): a callout-EXEMPT static user
      # whose `cmd.*` wildcard left the `<self>` suffix advisory is an auth bypass on a per-tenant bus
      # (cross-review T1 finding). Browsers/app/visitors carry NO static user — they present a token and
      # are minted per-connection by the responder. This obsoletes the prior phase-1
      # `deploy.security.client-log-write-denied` scenario (the user no longer exists).
    ]
  }
}

# Browser/app connections (no static user) are routed to the callout. The responder signs minted
# user JWTs with the issuer key and places them in the RP account. `auth_users` carries every
# trusted static identity so cutover locks NOBODY out: the router (sole `.log` writer) and the
# responder itself authenticate by password and skip the callout.
authorization {
  auth_callout {
    issuer: $AUTH_CALLOUT_ISSUER
    account: RP
    # RP's OWN static identities. The SHARED-INFRA auth_users is the UNION of these + desk's
    # (desk-rp, desk-api) + the connector (connector-zalo), assembled in the desk Helm values at the
    # cutover (ADR-0004 §3 / the desk canonical change V2-01) — this reference config is RP-standalone.
    auth_users: [ router, projector, authsvc ]
  }
}

system_account: SYS
